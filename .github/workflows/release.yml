name: Test and Release

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    outputs:
      full_coverage: ${{ steps.coverage_check.outputs.full_coverage }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.7.3
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov-report=xml

      - name: Check for 100% coverage
        id: coverage_check
        run: |
          total_coverage=$(awk -F'"' '/line-rate=/ { print $2 }' coverage.xml || echo "0.0")
          echo "Coverage: $total_coverage"
          if awk "BEGIN {exit !($total_coverage == 1.0)}"; then
            echo "Full coverage achieved!"
            echo "full_coverage=true" >> $GITHUB_OUTPUT
          else
            echo "Coverage is less than 100%"
            echo "full_coverage=false" >> $GITHUB_OUTPUT
          fi

  gather-test-results:
    runs-on: ubuntu-latest
    needs: test-matrix
    outputs:
      full_coverage: ${{ needs.test-matrix.outputs.full_coverage }}
    steps:
      - run: echo "Collected test matrix results."

  release:
    needs: gather-test-results
    if: needs.gather-test-results.outputs.full_coverage == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.7.3
          enable-cache: true
          cache-dependency-glob: "uv.lock"
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build project
        run: uv build

      - name: Publish to PyPI
        run: uv publish