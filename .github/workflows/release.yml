name: Test and Release

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    env:
      COMPLETION_THRESHOLD: 80
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.7.3
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest --maxfail=1 --disable-warnings -q --cov-report=xml:coverage.xml

      - name: Check for Adequate coverage
        id: coverage_check
        run: |
          mkdir -p artifacts
          touch artifacts/.tested-${{ matrix.python-version }}
          COVERAGE_RATE=$(grep -o 'line-rate="[0-9.]\+"' coverage.xml | head -n1 | cut -d'"' -f2)
          echo "Coverage: $COVERAGE_RATE"
          COVERAGE_PERCENT=$(echo "scale=2; $COVERAGE_RATE * 100" | bc)
          echo "Coverage percent: $COVERAGE_PERCENT"
          if [ "$COVERAGE_PERCENT" -ge "$COMPLETION_THRESHOLD" ]; then
            echo "Coverage passed on Python ${{ matrix.python-version }}"
            touch artifacts/.coverage-passed-${{ matrix.python-version }}
          else
            echo "Coverage too low on Python ${{ matrix.python-version }}"
            exit 1
          fi

      - name: Upload pass marker
        uses: actions/upload-artifact@v4
        with:
          name: test-markers
          path: artifacts/
          if-no-files-found: error

  release:
    needs: test-matrix
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all coverage markers
        uses: actions/download-artifact@v4
        with:
          name: test-markers
          path: artifacts

      - name: Check for full coverage
        run: |
          total_tested=$(find artifacts -type f -name ".tested-*" | wc -l)
          total_passed=$(find artifacts -type f -name ".coverage-passed-*" | wc -l)
          
          echo "Found $total_tested tested Python versions"
          echo "Found $total_passed versions with full coverage"
          
          if [ $total_passed -ne $total_tested ]; then
            echo "Not all tested versions have adequate coverage ($total_passed/$total_tested)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.7.3
          enable-cache: true
          cache-dependency-glob: "uv.lock"
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build project
        run: uv build

      - name: Publish to PyPI
        run: uv publish